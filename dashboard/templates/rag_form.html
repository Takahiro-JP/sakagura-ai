<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>RAG登録 - 酒蔵AIアシスタント</title>
    <style>
        body { font-family: sans-serif; max-width: 600px; margin: 0 auto; padding: 20px; }
        h1 { color: #333; border-bottom: 2px solid #333; padding-bottom: 10px; }
        nav a { margin-right: 20px; color: #0066cc; text-decoration: none; }
        label { display: block; margin-top: 16px; font-weight: bold; }
        input {
            width: 100%; padding: 8px; margin-top: 4px;
            border: 1px solid #ccc; border-radius: 4px;
            box-sizing: border-box;
        }
        button {
            margin-top: 24px; padding: 10px 24px;
            background: #333; color: white;
            border: none; border-radius: 4px; cursor: pointer;
        }
        button:hover { background: #555; }
        .message { margin-top: 20px; padding: 12px; border-radius: 4px; }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
    </style>
</head>
<body>
    <h1>酒蔵AIアシスタント</h1>
    <nav>
        <a href="/">商品一覧</a>
        <a href="/products/new">商品追加</a>
        <a href="/history">投稿履歴</a>
        <a href="/rag">RAG一覧</a>
    </nav>

    <h2>RAG URL登録</h2>
    <form method="post" action="/rag/register">
        <label>URL</label>
        <input type="url" name="url" placeholder="https://prtimes.jp/..." required>
        <button type="submit">登録する</button>
    </form>

    {% if message %}
    <div class="message {{ message_type }}">
        {{ message }}
    </div>
    {% endif %}
</body>
</html>
