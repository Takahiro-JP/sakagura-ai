<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>商品追加 - 酒蔵AIアシスタント</title>
    <style>
        body { font-family: sans-serif; max-width: 600px; margin: 0 auto; padding: 20px; }
        h1 { color: #333; border-bottom: 2px solid #333; padding-bottom: 10px; }
        nav a { margin-right: 20px; color: #0066cc; text-decoration: none; }
        label { display: block; margin-top: 16px; font-weight: bold; }
        input, textarea, select {
            width: 100%; padding: 8px; margin-top: 4px;
            border: 1px solid #ccc; border-radius: 4px;
            box-sizing: border-box;
        }
        textarea { height: 80px; }
        button {
            margin-top: 24px; padding: 10px 24px;
            background: #333; color: white;
            border: none; border-radius: 4px; cursor: pointer;
        }
        button:hover { background: #555; }
    </style>
</head>
<body>
    <h1>酒蔵AIアシスタント</h1>
    <nav>
        <a href="/">商品一覧</a>
        <a href="/history">投稿履歴</a>
        <a href="/rag">RAG一覧</a>
    </nav>

    <h2>商品追加</h2>
    <form method="post" action="/products/new">
        <label>商品名</label>
        <input type="text" name="name" placeholder="楯野川 純米大吟醸 清流" required>

        <label>シリーズ</label>
        <select name="series">
            <option>Basic</option>
            <option>Extreme</option>
            <option>無我</option>
            <option>SAKERISE</option>
            <option>Shield</option>
            <option>リキュール</option>
        </select>

        <label>精米歩合（%）</label>
        <input type="number" name="seimaibuai" placeholder="50">

        <label>価格（円）</label>
        <input type="number" name="price" placeholder="1650">

        <label>味わいの特徴</label>
        <textarea name="flavor_notes" placeholder="穏やかな香りと柔らかな口当たり。食中酒として最適。"></textarea>

        <label>ターゲット層</label>
        <select name="target_age">
            <option>全世代</option>
            <option>20代</option>
            <option>20-30代</option>
            <option>30-40代</option>
            <option>40代以上</option>
        </select>

        <button type="submit">追加する</button>
    </form>
</body>
</html>
